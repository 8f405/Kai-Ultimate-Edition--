<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Pulse Analyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:          #07090d;
      --bg-2:        #0c0f15;
      --surface:     #111520;
      --surface-2:   #161c2a;
      --border:      #1e2740;
      --border-bright: #2a3a5c;

      --cyan:        #38bdf8;
      --cyan-dim:    rgba(56,189,248,0.12);
      --cyan-glow:   rgba(56,189,248,0.25);
      --green:       #34d399;
      --green-dim:   rgba(52,211,153,0.12);
      --amber:       #fbbf24;
      --amber-dim:   rgba(251,191,36,0.12);
      --red:         #f87171;
      --red-dim:     rgba(248,113,113,0.12);
      --purple:      #a78bfa;
      --purple-dim:  rgba(167,139,250,0.1);

      --text:        #b8c0d0;
      --text-dim:    #4a5568;
      --text-mid:    #6b7a99;
      --text-bright: #e2e8f0;
      --text-white:  #f1f5f9;

      --mono:  'JetBrains Mono', monospace;
      --sans:  'Inter', sans-serif;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Grid noise texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(56,189,248,0.03) 0%, transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(167,139,250,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════ */
    .header {
      position: relative; z-index: 20;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 30px; height: 30px;
      background: var(--cyan-dim);
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 16px; height: 16px; }

    .logo-name {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.02em;
    }

    .logo-name em {
      font-style: normal;
      color: var(--cyan);
    }

    .logo-sep {
      width: 1px; height: 16px;
      background: var(--border);
      margin: 0 4px;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: live-pulse 2s ease-in-out infinite;
    }

    @keyframes live-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
      50%       { box-shadow: 0 0 0 4px rgba(52,211,153,0); }
    }

    .scope-pills {
      display: flex;
      gap: 6px;
    }

    .scope-pill {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid;
    }

    .pill-models  { color: var(--cyan);   border-color: rgba(56,189,248,0.25); background: var(--cyan-dim); }
    .pill-arch    { color: var(--green);  border-color: rgba(52,211,153,0.25); background: var(--green-dim); }
    .pill-hw      { color: var(--amber);  border-color: rgba(251,191,36,0.25); background: var(--amber-dim); }

    /* ═══════════════════════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════════════════════ */
    .layout {
      position: relative; z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
      min-height: 0;
    }

    /* ═══════════════════════════════════════════════════════
       MESSAGES
    ═══════════════════════════════════════════════════════ */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Welcome screen ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 32px 16px 24px;
      margin: auto 0;
      animation: fadeUp 0.4s ease;
    }

    .welcome-icon {
      width: 56px; height: 56px;
      background: var(--cyan-dim);
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }

    .welcome-icon svg { width: 28px; height: 28px; }

    .welcome h1 {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-mid);
      max-width: 400px;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .suggest-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 560px;
    }

    .suggest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .suggest-card:hover {
      border-color: var(--border-bright);
      background: var(--surface-2);
      transform: translateY(-1px);
    }

    .suggest-card:active { transform: translateY(0); }

    .suggest-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .suggest-card.c-cyan  .suggest-label { color: var(--cyan); }
    .suggest-card.c-green .suggest-label { color: var(--green); }
    .suggest-card.c-amber .suggest-label { color: var(--amber); }
    .suggest-card.c-purple .suggest-label { color: var(--purple); }

    .suggest-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
    }

    /* ── Message row ── */
    .msg-row {
      display: flex;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.2s ease;
    }

    .msg-row:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 7px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .msg-row.user .msg-avatar {
      background: var(--purple-dim);
      border: 1px solid rgba(167,139,250,0.25);
      color: var(--purple);
    }

    .msg-row.assistant .msg-avatar {
      background: var(--cyan-dim);
      border: 1px solid rgba(56,189,248,0.25);
      color: var(--cyan);
    }

    .msg-body { flex: 1; min-width: 0; }

    /* ── Message header ── */
    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      flex-wrap: wrap;
    }

    .msg-author {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .msg-row.user .msg-author       { color: var(--purple); }
    .msg-row.assistant .msg-author  { color: var(--cyan); }

    .status-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid;
    }

    .badge-tool      { color: var(--green); border-color: rgba(52,211,153,0.3); background: var(--green-dim); }
    .badge-direct    { color: var(--cyan);  border-color: rgba(56,189,248,0.2); background: var(--cyan-dim); }
    .badge-filtered  { color: var(--amber); border-color: rgba(251,191,36,0.3); background: var(--amber-dim); }
    .badge-safety    { color: var(--red);   border-color: rgba(248,113,113,0.3); background: var(--red-dim); }
    .badge-escape    { color: var(--text-mid); border-color: var(--border); background: var(--surface); }

    .msg-ts {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ── Message content ── */
    .msg-content {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      word-break: break-word;
    }

    .msg-row.user .msg-content { color: var(--text-bright); }

    .msg-content strong { color: var(--text-bright); font-weight: 600; }
    .msg-content em     { color: var(--text-mid); font-style: italic; }

    .msg-content code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--cyan);
    }

    .msg-content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--cyan);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .msg-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: var(--text-bright);
    }

    .msg-content ul, .msg-content ol {
      padding-left: 20px;
      margin: 6px 0;
    }

    .msg-content li { margin-bottom: 3px; }

    .msg-content p  { margin-bottom: 6px; }
    .msg-content p:last-child { margin-bottom: 0; }

    /* ── Search indicator ── */
    .search-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--cyan);
      background: var(--cyan-dim);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }

    .search-pill svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* ── Sources section ── */
    .sources-section {
      margin-top: 12px;
    }

    .sources-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-mid);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: color 0.15s;
    }

    .sources-toggle:hover { color: var(--cyan); }

    .sources-toggle svg {
      width: 10px; height: 10px;
      transition: transform 0.2s;
    }

    .sources-toggle.open svg { transform: rotate(90deg); }

    .sources-list {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }

    .sources-list.open { display: flex; }

    .source-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .source-item:hover {
      border-color: var(--border-bright);
      background: var(--surface-2);
    }

    .source-num {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .source-info { min-width: 0; }

    .source-title {
      font-size: 12px;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-url {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-ext {
      margin-left: auto;
      flex-shrink: 0;
      color: var(--text-dim);
    }

    .source-ext svg { width: 10px; height: 10px; }

    /* ── Message footer ── */
    .msg-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      color: var(--text);
      border-color: var(--border);
      background: var(--surface);
    }

    .copy-btn svg { width: 11px; height: 11px; }

    /* ── Typing indicator ── */
    .typing-row { padding: 16px 0; display: flex; gap: 12px; }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 24px;
    }

    .typing-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0.4;
      animation: blink 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.25; transform: scale(1); }
      30%           { opacity: 1;    transform: scale(1.3); }
    }

    .searching-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--cyan);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .searching-msg .dots span {
      animation-delay: calc(var(--i) * 0.15s);
    }

    /* ═══════════════════════════════════════════════════════
       INPUT AREA
    ═══════════════════════════════════════════════════════ */
    .input-area {
      flex-shrink: 0;
      padding: 12px 0 20px;
      background: linear-gradient(to bottom, transparent 0%, var(--bg) 25%);
    }

    .input-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-shell:focus-within {
      border-color: rgba(56,189,248,0.4);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.06);
    }

    .input-top {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 14px 10px;
    }

    .input-prompt {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--cyan);
      flex-shrink: 0;
      padding-bottom: 2px;
      user-select: none;
      opacity: 0.7;
    }

    #userInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      overflow-y: auto;
    }

    #userInput::placeholder {
      color: var(--text-dim);
      font-style: italic;
    }

    #userInput::-webkit-scrollbar { width: 3px; }
    #userInput::-webkit-scrollbar-thumb { background: var(--border); }

    .input-actions {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 6px;
      padding-bottom: 2px;
    }

    #charCount {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      min-width: 40px;
      text-align: right;
    }

    #charCount.warn { color: var(--amber); }

    .send-btn {
      width: 32px; height: 32px;
      background: var(--cyan);
      border: none;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: #67ccf0;
      transform: scale(1.06);
    }

    .send-btn:active:not(:disabled) { transform: scale(0.97); }

    .send-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .send-btn svg { width: 14px; height: 14px; fill: var(--bg); }

    .input-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 10px;
    }

    .input-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .input-hint kbd {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 4px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-mid);
    }

    .clear-btn {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
      display: none;
    }

    .clear-btn:hover { color: var(--text); }
    .clear-btn.visible { display: block; }

    /* ═══════════════════════════════════════════════════════
       COPY TOAST
    ═══════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface-2);
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      padding: 7px 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-bright);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════ */
    @media (max-width: 600px) {
      .scope-pills { display: none; }
      .suggest-grid { grid-template-columns: 1fr; }
      .header { padding: 0 16px; }
      .layout { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" stroke="#38bdf8" stroke-width="1.5">
          <path d="M3 10l4-4 3 3 4-4 3 3"/>
          <circle cx="10" cy="10" r="8.5"/>
        </svg>
      </div>
      <span class="logo-name">AI<em>-Pulse</em></span>
      <div class="logo-sep"></div>
      <span class="logo-sub">Analyst · 2025–2026</span>
    </div>

    <div class="header-right">
      <div class="scope-pills">
        <span class="scope-pill pill-models">Models</span>
        <span class="scope-pill pill-arch">Architectures</span>
        <span class="scope-pill pill-hw">Hardware</span>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        Live Feed
      </div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <div class="layout">

    <!-- Messages -->
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 28 28" fill="none" stroke="#38bdf8" stroke-width="1.5">
            <circle cx="14" cy="14" r="12"/>
            <path d="M9 14l3.5 3.5L19 10"/>
          </svg>
        </div>
        <h1>AI Research Terminal</h1>
        <p>Ask technical questions about AI/ML models, architectures, benchmarks, and hardware from 2025-2026. Powered by live search.</p>
        <div class="suggest-grid">
          <button class="suggest-card c-cyan" onclick="useQuery(this)">
            <div class="suggest-label">Models</div>
            <div class="suggest-text">What's new in Gemini 2.0 Flash Lite?</div>
          </button>
          <button class="suggest-card c-green" onclick="useQuery(this)">
            <div class="suggest-label">Architecture</div>
            <div class="suggest-text">Explain MLA in DeepSeek-V3</div>
          </button>
          <button class="suggest-card c-amber" onclick="useQuery(this)">
            <div class="suggest-label">Hardware</div>
            <div class="suggest-text">Nvidia Rubin GPU specs vs Blackwell</div>
          </button>
          <button class="suggest-card c-purple" onclick="useQuery(this)">
            <div class="suggest-label">Research</div>
            <div class="suggest-text">State of agentic AI frameworks 2026</div>
          </button>
          <button class="suggest-card c-cyan" onclick="useQuery(this)">
            <div class="suggest-label">Benchmarks</div>
            <div class="suggest-text">GPT-5 reasoning benchmark results</div>
          </button>
          <button class="suggest-card c-green" onclick="useQuery(this)">
            <div class="suggest-label">Quantization</div>
            <div class="suggest-text">How does 1-bit LLM quantization work?</div>
          </button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-shell">
        <div class="input-top">
          <span class="input-prompt">›_</span>
          <textarea
            id="userInput"
            rows="1"
            placeholder="Ask about AI models, architectures, benchmarks..."
            oninput="handleInput()"
            onkeydown="handleKey(event)"
          ></textarea>
          <div class="input-actions">
            <span id="charCount">0</span>
            <button class="send-btn" id="sendBtn" onclick="send()" title="Send (Enter)">
              <svg viewBox="0 0 16 16"><path d="M15 1L7 9"/><path d="M15 1L10 15 7 9 1 6l14-5z"/></svg>
            </button>
          </div>
        </div>
        <div class="input-bottom">
          <span class="input-hint"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline</span>
          <button class="clear-btn" id="clearBtn" onclick="clearInput()">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Copy toast -->
  <div class="toast" id="toast">Copied to clipboard</div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let history = [];   // [{role, content}] for multi-turn context
    const MAX_CHARS = 800;

    const STATUS_MAP = {
      tool_used:       { label: 'Live Search', cls: 'badge-tool' },
      direct:          { label: 'Cached',      cls: 'badge-direct' },
      filtered_scope:  { label: 'Out of Scope', cls: 'badge-filtered' },
      filtered_safety: { label: 'Safety Block', cls: 'badge-safety' },
      escape_hatch:    { label: 'Low Confidence', cls: 'badge-escape' },
    };

    // ── Utilities ──────────────────────────────────────────────────────────
    function esc(s) {
      return s
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function parseDomain(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); }
      catch { return url; }
    }

    function renderMarkdown(text) {
      return text
        // code blocks
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${esc(code.trim())}</code></pre>`)
        // inline code
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        // bold
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        // italic (asterisk)
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        // bullet points
        .replace(/^[•\-]\s+(.+)$/gm, '<li>$1</li>')
        // newlines to <br> (but not inside pre)
        .replace(/\n(?!<\/?(pre|li|ul))/g, '<br>');
    }

    // ── Input handling ─────────────────────────────────────────────────────
    function handleInput() {
      const el = document.getElementById('userInput');
      const cc = document.getElementById('charCount');
      const cb = document.getElementById('clearBtn');

      // Auto-resize
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';

      const len = el.value.length;
      cc.textContent = len;
      cc.classList.toggle('warn', len > MAX_CHARS * 0.85);
      cb.classList.toggle('visible', len > 0);
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    }

    function clearInput() {
      const el = document.getElementById('userInput');
      el.value = '';
      el.style.height = 'auto';
      handleInput();
      el.focus();
    }

    function useQuery(btn) {
      const text = btn.querySelector('.suggest-text').textContent;
      const el = document.getElementById('userInput');
      el.value = text;
      handleInput();
      el.focus();
    }

    // ── Append messages ────────────────────────────────────────────────────
    function removeWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
    }

    function appendUser(text) {
      removeWelcome();
      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `
        <div class="msg-avatar">YOU</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-author">You</span>
            <span class="msg-ts">${now()}</span>
          </div>
          <div class="msg-content">${esc(text)}</div>
        </div>`;
      msgs.appendChild(row);
      scrollBottom();
    }

    function appendTyping(searchQuery) {
      removeWelcome();
      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing';
      const searchHtml = searchQuery
        ? `<div class="searching-msg">
             <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12">
               <circle cx="6" cy="6" r="4.5"/><line x1="10" y1="10" x2="13" y2="13"/>
             </svg>
             Searching: <em style="color:var(--text-mid)">${esc(searchQuery)}</em>
           </div>`
        : '';
      row.innerHTML = `
        <div class="msg-avatar" style="background:var(--cyan-dim);border:1px solid rgba(56,189,248,0.25);color:var(--cyan);font-family:var(--mono);font-size:9px;font-weight:700">AI</div>
        <div class="msg-body">
          <div class="msg-header"><span class="msg-author" style="color:var(--cyan)">AI-Pulse Analyst</span></div>
          ${searchHtml}
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>`;
      msgs.appendChild(row);
      scrollBottom();
    }

    function appendAssistant(data) {
      const t = document.getElementById('typing');
      if (t) t.remove();

      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'msg-row assistant';

      const statusInfo = STATUS_MAP[data.status] || { label: data.status, cls: 'badge-escape' };
      const badgeHtml = `<span class="status-badge ${statusInfo.cls}">${statusInfo.label}</span>`;

      // Search pill
      let searchPillHtml = '';
      if (data.search_query) {
        searchPillHtml = `
          <div class="search-pill">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="6" cy="6" r="4.5"/><line x1="10" y1="10" x2="13" y2="13"/>
            </svg>
            Searched: ${esc(data.search_query)}
          </div>`;
      }

      // Sources
      let sourcesHtml = '';
      if (data.sources && data.sources.length > 0) {
        const itemsHtml = data.sources.map((s, i) => `
          <a class="source-item" href="${esc(s.url)}" target="_blank" rel="noopener">
            <span class="source-num">${i + 1}</span>
            <div class="source-info">
              <div class="source-title">${esc(s.title)}</div>
              <div class="source-url">${esc(parseDomain(s.url))}</div>
            </div>
            <div class="source-ext">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M5 2H2.5A1.5 1.5 0 0 0 1 3.5v6A1.5 1.5 0 0 0 2.5 11h6A1.5 1.5 0 0 0 10 9.5V7"/>
                <path d="M7 1h4v4"/><line x1="11" y1="1" x2="6" y2="6"/>
              </svg>
            </div>
          </a>`).join('');

        sourcesHtml = `
          <div class="sources-section">
            <button class="sources-toggle" onclick="toggleSources(this)">
              <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
                <polyline points="3,2 7,5 3,8"/>
              </svg>
              ${data.sources.length} source${data.sources.length > 1 ? 's' : ''} used
            </button>
            <div class="sources-list">${itemsHtml}</div>
          </div>`;
      }

      // Raw text for copying (store on element)
      const rawText = data.response;

      row.innerHTML = `
        <div class="msg-avatar">AI</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-author">AI-Pulse Analyst</span>
            ${badgeHtml}
            <span class="msg-ts">${now()}</span>
          </div>
          ${searchPillHtml}
          <div class="msg-content">${renderMarkdown(data.response)}</div>
          ${sourcesHtml}
          <div class="msg-footer">
            <button class="copy-btn" onclick="copyMsg(this)">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="5" y="5" width="8" height="8" rx="1.5"/>
                <path d="M3 9H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v1"/>
              </svg>
              Copy
            </button>
          </div>
        </div>`;

      row.dataset.raw = rawText;
      msgs.appendChild(row);
      scrollBottom();
    }

    // ── Source toggle ──────────────────────────────────────────────────────
    function toggleSources(btn) {
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open');
    }

    // ── Copy button ────────────────────────────────────────────────────────
    function copyMsg(btn) {
      const row = btn.closest('.msg-row');
      const text = row.dataset.raw || row.querySelector('.msg-content').innerText;
      navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ── Scroll ─────────────────────────────────────────────────────────────
    function scrollBottom() {
      const msgs = document.getElementById('messages');
      requestAnimationFrame(() => msgs.scrollTop = msgs.scrollHeight);
    }

    // ── Send ───────────────────────────────────────────────────────────────
    async function send() {
      const el   = document.getElementById('userInput');
      const btn  = document.getElementById('sendBtn');
      const query = el.value.trim();
      if (!query || btn.disabled) return;

      appendUser(query);
      history.push({ role: 'user', content: query });
      el.value = '';
      el.style.height = 'auto';
      handleInput();
      btn.disabled = true;
      appendTyping('');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, history: history.slice(0, -1) }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Update typing indicator with search query if tool call was made
        const typing = document.getElementById('typing');
        if (typing && data.search_query) {
          const sm = typing.querySelector('.searching-msg, .typing-dots');
          if (sm && !typing.querySelector('.searching-msg')) {
            sm.insertAdjacentHTML('beforebegin', `
              <div class="searching-msg">
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12">
                  <circle cx="6" cy="6" r="4.5"/><line x1="10" y1="10" x2="13" y2="13"/>
                </svg>
                Searched: <em style="color:var(--text-mid)">${esc(data.search_query)}</em>
              </div>`);
          }
        }

        appendAssistant(data);
        history.push({ role: 'assistant', content: data.response });

        // Keep history bounded
        if (history.length > 20) history = history.slice(-20);

      } catch (err) {
        appendAssistant({
          response: `Connection error: ${err.message}. Is the server running?`,
          status: 'escape_hatch',
          sources: [],
          search_query: '',
        });
      } finally {
        btn.disabled = false;
        el.focus();
      }
    }

    // ── Focus input on load ────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('userInput').focus();
    });
  </script>
</body>
</html>
